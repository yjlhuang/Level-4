<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>戰勝學測 Level 4 英語單字</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222535;--border:#2e3247;
  --accent:#4f8ef7;--accent2:#7c5cbf;
  --green:#3ecf8e;--yellow:#f5c842;--red:#f06060;--gray:#4a4f6a;
  --text:#e8eaf6;--text2:#9096b8;--text3:#5a607a;
  --card-front:#1e2236;--card-back:#1a2640;
  --radius:14px;--shadow:0 4px 24px rgba(0,0,0,.4);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  -webkit-text-size-adjust:100%;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;opacity:.2;pointer-events:none;z-index:0;
}

/* PAGES */
.page{display:none;position:relative;z-index:1;min-height:100vh;}
.page.active{display:block;}

/* ── HOME ── */
#page-home{
  padding:40px 16px calc(24px + var(--safe-bottom));
  display:flex;flex-direction:column;align-items:center;
}
.home-header{text-align:center;margin-bottom:32px;}
.home-logo{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:4px;
  color:var(--accent);text-transform:uppercase;margin-bottom:12px;opacity:.8;
}
.home-title{
  font-family:'Noto Serif TC',serif;
  font-size:clamp(26px,6vw,42px);font-weight:700;
  line-height:1.2;margin-bottom:8px;
}
.home-subtitle{color:var(--text2);font-size:14px;font-weight:300;}
.home-stats{
  display:flex;gap:10px;margin-top:12px;
  justify-content:center;flex-wrap:wrap;
}
.stat-pill{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:5px 14px;
  font-size:12px;color:var(--text2);
}
.stat-pill strong{color:var(--accent);}

.home-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  width:100%;max-width:480px;margin-bottom:12px;
  box-shadow:var(--shadow);
}
.home-card h3{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:16px;
}

/* Unit pills */
.unit-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.unit-pill{
  padding:6px 13px;border-radius:20px;
  font-size:13px;font-family:'DM Mono',monospace;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text2);cursor:pointer;transition:all .15s;
  user-select:none;min-height:36px;display:flex;align-items:center;
}
.unit-pill:hover{border-color:var(--accent);color:var(--accent);}
.unit-pill.selected{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Number range within unit */
.unit-range-row{
  display:flex;align-items:center;gap:8px;
  padding:12px 14px;background:var(--surface2);
  border-radius:10px;border:1px solid var(--border);
}
.unit-range-row label{font-size:12px;color:var(--text2);white-space:nowrap;}
.range-input{
  background:transparent;border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-family:'DM Mono',monospace;font-size:14px;
  width:44px;text-align:center;outline:none;padding:2px 4px;
  transition:border-color .2s;
}
.range-input:focus{border-color:var(--accent);}
.range-hint{font-size:12px;color:var(--text3);margin-top:8px;}

/* Mode buttons */
.mode-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.mode-btn{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:12px;padding:16px 8px;cursor:pointer;
  transition:all .2s;text-align:center;color:var(--text);
  min-height:88px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
}
.mode-btn:active{transform:scale(.97);}
.mode-btn.selected{border-color:var(--accent);background:rgba(79,142,247,.08);}
.mode-btn .mode-icon{font-size:26px;}
.mode-btn .mode-label{font-size:13px;font-weight:600;}
.mode-btn .mode-desc{font-size:10px;color:var(--text3);}

.fc-toggle-row{
  display:flex;align-items:center;gap:10px;
  margin-top:12px;padding:12px 14px;
  background:var(--surface2);border-radius:10px;
  border:1px solid var(--border);cursor:pointer;
}
.toggle-switch{
  width:38px;height:22px;background:var(--gray);
  border-radius:11px;position:relative;flex-shrink:0;transition:background .2s;
}
.toggle-switch.on{background:var(--accent);}
.toggle-switch::after{
  content:'';position:absolute;
  width:16px;height:16px;background:#fff;border-radius:50%;
  top:3px;left:3px;transition:transform .2s;
}
.toggle-switch.on::after{transform:translateX(16px);}
.fc-toggle-label{font-size:13px;color:var(--text2);}

.start-btn{
  width:100%;max-width:480px;
  padding:17px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:var(--radius);
  color:#fff;font-size:17px;font-weight:600;
  cursor:pointer;transition:opacity .2s,transform .15s;
  letter-spacing:.5px;margin-bottom:14px;
  min-height:54px;
}
.start-btn:active{transform:scale(.98);}
.start-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}

.review-link{
  color:var(--text2);font-size:13px;cursor:pointer;
  transition:color .2s;display:flex;align-items:center;gap:6px;
  padding:8px 0;
}
.review-link:hover{color:var(--accent);}

/* ── PROGRESS ── */
.progress-bar-wrap{
  width:100%;height:5px;background:var(--surface2);
  border-radius:3px;overflow:hidden;margin-bottom:20px;
}
.progress-bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:3px;transition:width .3s ease;
}
.progress-label{
  font-size:11px;font-family:'DM Mono',monospace;
  color:var(--text3);text-align:right;margin-bottom:4px;
}

/* ── PAGE HEADERS ── */
.pg-header{
  display:flex;align-items:center;gap:10px;
  padding:16px 16px 0;margin-bottom:20px;
  position:sticky;top:0;
  background:var(--bg);z-index:10;
  border-bottom:1px solid var(--border);
  padding-bottom:12px;
}
.back-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:8px 14px;
  color:var(--text2);cursor:pointer;font-size:13px;
  min-height:38px;white-space:nowrap;
  transition:all .15s;
}
.back-btn:active{transform:scale(.96);}
.pg-title{font-size:16px;font-weight:600;flex:1;}
.pg-meta{
  font-size:11px;font-family:'DM Mono',monospace;
  color:var(--text3);white-space:nowrap;
}

/* ── FLIP CARD ── */
.flip-card-container{
  perspective:1200px;width:100%;
  margin:0 auto 20px;height:260px;
}
.flip-card{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.flip-card.flipped{transform:rotateY(180deg);}
.flip-face{
  position:absolute;inset:0;backface-visibility:hidden;
  border-radius:18px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px 20px;text-align:center;
}
.flip-front{background:var(--card-front);border:1px solid var(--border);}
.flip-back{background:var(--card-back);border:1px solid #2a4060;transform:rotateY(180deg);}
.flip-hint{
  position:absolute;bottom:12px;
  font-size:11px;color:var(--text3);
  font-family:'DM Mono',monospace;
}
.fc-num-badge{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:8px;}
.fc-word-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.fc-word{font-size:34px;font-weight:700;letter-spacing:-.5px;}
.audio-btn{
  background:none;border:none;font-size:20px;cursor:pointer;
  opacity:.55;transition:opacity .15s;padding:4px;
  flex-shrink:0;
}
.audio-btn:active{opacity:1;transform:scale(.9);}
.fc-pos-pill{
  font-size:12px;font-family:'DM Mono',monospace;
  color:var(--accent);background:rgba(79,142,247,.12);
  padding:3px 12px;border-radius:20px;
}
.fc-meaning-back{
  font-family:'Noto Serif TC',serif;
  font-size:20px;color:var(--text);
  margin-bottom:12px;line-height:1.6;
}
.fc-example-back{
  font-size:12px;color:var(--text2);line-height:1.7;max-width:320px;
}
.fc-example-back .w-hl{color:var(--accent);font-weight:600;}
.fc-example-chi{
  margin-top:8px;font-family:'Noto Serif TC',serif;
  font-size:12px;color:var(--text3);line-height:1.6;
  border-top:1px solid var(--border);padding-top:8px;
}

/* Card nav buttons */
.card-nav{
  display:flex;gap:12px;
  padding:0 16px;margin-bottom:16px;
}
.card-nav .btn{flex:1;min-height:48px;}

/* Word list grid */
.word-list-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:8px;padding:0 16px 20px;
}
.word-chip{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;padding:12px;cursor:pointer;
  transition:all .15s;position:relative;
  min-height:64px;
}
.word-chip:active{transform:scale(.97);}
.word-chip.skipped{border-color:var(--yellow);}
.word-chip.seen{border-color:var(--green);opacity:.65;}
.word-chip-num{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:4px;}
.word-chip-word{font-weight:700;font-size:14px;}
.word-chip-badge{
  position:absolute;top:8px;right:8px;
  width:7px;height:7px;border-radius:50%;
}
.word-chip.skipped .word-chip-badge{background:var(--yellow);}
.word-chip.seen .word-chip-badge{background:var(--green);}

/* Buttons */
.btn{
  padding:12px 20px;border-radius:10px;
  font-size:14px;font-weight:500;cursor:pointer;
  border:1.5px solid transparent;transition:all .15s;
  font-family:'DM Sans',sans-serif;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  min-height:46px;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-secondary{background:transparent;border-color:var(--border);color:var(--text2);}
.btn-secondary:hover{border-color:var(--text3);color:var(--text);}
.btn-danger{background:transparent;border-color:var(--red);color:var(--red);}
.btn-full{width:100%;}

/* ── QUIZ ── */
#page-quiz{padding:0 0 24px;}
.quiz-inner{padding:0 16px;}
.quiz-type-badge{
  font-size:10px;font-family:'DM Mono',monospace;
  letter-spacing:2px;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;
  background:rgba(79,142,247,.15);color:var(--accent);
}
.quiz-q{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px 20px;
  margin-bottom:14px;min-height:140px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
}
.quiz-q-label{
  font-size:11px;font-family:'DM Mono',monospace;
  color:var(--text3);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:14px;
}
.quiz-word-row{display:flex;align-items:center;gap:8px;}
.quiz-q-word{font-size:32px;font-weight:700;letter-spacing:-.5px;}
.quiz-q-meaning{
  font-family:'Noto Serif TC',serif;font-size:19px;
  color:var(--text2);line-height:1.5;
}
.quiz-q-sentence{font-size:15px;color:var(--text2);line-height:1.8;}
.quiz-q-sentence .blank{
  display:inline-block;width:70px;height:2px;
  border-bottom:2px solid var(--accent);
  margin:0 4px;vertical-align:middle;
}
.quiz-options{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;margin-bottom:14px;
}
.quiz-opt{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;padding:14px 14px;cursor:pointer;
  text-align:left;color:var(--text);
  font-size:14px;line-height:1.4;transition:all .15s;
  font-family:'DM Sans',sans-serif;min-height:60px;
  display:flex;flex-direction:column;justify-content:center;
}
.quiz-opt:active:not(:disabled){transform:scale(.97);}
.quiz-opt .opt-label{
  font-size:10px;font-family:'DM Mono',monospace;
  color:var(--text3);margin-bottom:4px;display:block;
}
.quiz-opt.correct{border-color:var(--green);background:rgba(62,207,142,.1);color:var(--green);}
.quiz-opt.wrong{border-color:var(--red);background:rgba(240,96,96,.1);color:var(--red);}
.quiz-next-btn{
  display:none;width:100%;padding:14px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);cursor:pointer;
  font-size:14px;font-weight:500;transition:all .15s;
  min-height:48px;
}
.quiz-next-btn.visible{display:block;}
.blank-note{
  font-size:11px;color:var(--text3);
  text-align:center;margin-bottom:8px;
  font-style:italic;
}

/* ── MATCH ── */
#page-match{padding:0 0 24px;}
.match-inner{padding:0 16px;}

/* Timer */
.timer-bar-wrap{
  width:100%;height:8px;background:var(--surface2);
  border-radius:4px;overflow:hidden;margin-bottom:6px;
}
.timer-bar-fill{
  height:100%;background:var(--green);
  border-radius:4px;transition:width .5s linear,background .5s;
}
.timer-bar-fill.warning{background:var(--yellow);}
.timer-bar-fill.danger{background:var(--red);}
.timer-row{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:16px;
}
.timer-num{
  font-family:'DM Mono',monospace;font-size:16px;font-weight:500;
}
.timer-num.warning{color:var(--yellow);}
.timer-num.danger{color:var(--red);}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.match-col{display:flex;flex-direction:column;gap:6px;}
.match-item{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;padding:13px 12px;cursor:pointer;
  transition:all .15s;font-size:13px;
  user-select:none;min-height:50px;
  display:flex;align-items:center;line-height:1.3;
}
.match-item:active{transform:scale(.97);}
.match-item.selected{border-color:var(--accent);background:rgba(79,142,247,.12);}
.match-item.matched-ok{border-color:var(--green);background:rgba(62,207,142,.08);color:var(--green);pointer-events:none;}
.match-item.matched-err{border-color:var(--red);background:rgba(240,96,96,.08);color:var(--red);animation:shake .3s ease;}
.match-word{font-weight:700;}
.match-meaning{font-family:'Noto Serif TC',serif;line-height:1.4;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.match-group-header{
  font-size:11px;color:var(--text3);
  font-family:'DM Mono',monospace;
  text-align:center;margin-bottom:10px;
}

/* ── SCORE ── */
#page-score{
  padding:32px 16px calc(32px + var(--safe-bottom));
  max-width:520px;margin:0 auto;text-align:center;
}
.score-grade{font-size:48px;margin-bottom:16px;}
.score-circle{
  width:130px;height:130px;border-radius:50%;
  background:conic-gradient(var(--accent) 0% var(--pct),var(--surface2) var(--pct));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;position:relative;
}
.score-circle::after{
  content:'';width:100px;height:100px;
  background:var(--bg);border-radius:50%;position:absolute;
}
.score-number{
  font-size:32px;font-weight:700;
  font-family:'DM Mono',monospace;position:relative;z-index:1;
}
.score-detail{font-size:14px;color:var(--text2);margin-bottom:8px;}
.score-time{font-size:13px;color:var(--text3);margin-bottom:28px;font-family:'DM Mono',monospace;}
.score-actions{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;
}
.error-list-title{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--text3);font-family:'DM Mono',monospace;
  margin-bottom:12px;text-align:left;
}
.error-item{
  background:var(--surface);border:1px solid var(--border);
  border-left:3px solid var(--red);border-radius:8px;
  padding:12px 14px;margin-bottom:8px;
  display:flex;align-items:flex-start;gap:12px;text-align:left;
}
.error-word{font-weight:700;font-size:15px;min-width:100px;}
.error-meaning{font-family:'Noto Serif TC',serif;color:var(--text2);font-size:12px;line-height:1.5;}

/* ── ALL CARDS ── */
#page-all-cards{padding:0 0 32px;}
.ac-controls{
  display:flex;gap:8px;flex-wrap:wrap;
  align-items:center;padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;top:57px;z-index:9;
}
.filter-pill{
  padding:6px 14px;border-radius:20px;font-size:12px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text2);cursor:pointer;transition:all .15s;
  min-height:32px;display:flex;align-items:center;
}
.filter-pill:active{transform:scale(.95);}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.sort-select{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;color:var(--text);
  font-size:12px;outline:none;
  padding:6px 12px;min-height:32px;
}
.search-input{
  padding:7px 14px;background:var(--surface2);
  border:1px solid var(--border);border-radius:20px;
  color:var(--text);font-size:13px;outline:none;
  width:100%;margin-top:6px;
  transition:border-color .2s;
}
.search-input:focus{border-color:var(--accent);}
.legend{
  display:flex;gap:14px;flex-wrap:wrap;
  padding:10px 16px;font-size:11px;color:var(--text2);
  border-bottom:1px solid var(--border);
}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.all-cards-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:8px;padding:14px 16px;
}
.ac-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;cursor:pointer;
  transition:all .15s;position:relative;overflow:hidden;
}
.ac-card:active{transform:scale(.97);}
.ac-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
}
.ac-card.status-gray::before{background:var(--gray);}
.ac-card.status-red::before{background:var(--red);}
.ac-card.status-yellow::before{background:var(--yellow);}
.ac-card.status-green::before{background:var(--green);}
.ac-word{font-weight:700;font-size:15px;margin-bottom:3px;padding-right:14px;}
.ac-num{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);}
.ac-meaning{font-family:'Noto Serif TC',serif;font-size:11px;color:var(--text2);margin-top:5px;line-height:1.4;}
.ac-status-dot{position:absolute;top:10px;right:10px;width:7px;height:7px;border-radius:50%;}
.ac-card.status-gray .ac-status-dot{background:var(--gray);}
.ac-card.status-red .ac-status-dot{background:var(--red);}
.ac-card.status-yellow .ac-status-dot{background:var(--yellow);}
.ac-card.status-green .ac-status-dot{background:var(--green);}

/* ── MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:100;
  align-items:flex-end;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex;}
.modal-body{
  max-width:480px;width:100%;
  padding-bottom:var(--safe-bottom);
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(24px + var(--safe-bottom));left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px 22px;font-size:14px;
  z-index:200;transition:transform .25s ease;pointer-events:none;
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.correct{border-color:var(--green);color:var(--green);}
.toast.wrong{border-color:var(--red);color:var(--red);}

input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}

<!-- ══ HOME ══ -->
<div id="page-home" class="page active">

    <div class="home-logo">Level 4 ✦ 核心單字</div>
    <h1 class="home-title">戰勝學測<br>英語單字</h1>
    <p class="home-subtitle">24 單元 · 819 個核心單字</p>
    <div class="home-stats">
      <span class="stat-pill">名詞 <strong>425</strong></span>
      <span class="stat-pill">動詞 <strong>210</strong></span>
      <span class="stat-pill">形容詞 <strong>172</strong></span>
    </div>
  </div>

  <div class="home-card">

    <div class="unit-pills" id="unit-pills"></div>

      <label style="color:var(--text3)">—</label>

      <label id="range-unit-max" style="font-size:11px;color:var(--text3);margin-left:2px"></label>
    </div>
    <div class="range-hint" id="range-hint">共 34 個單字（單元 1）</div>

  <div class="home-card">
    <h3>選擇模式</h3>
    <div class="mode-grid">
      <div class="mode-btn" id="mode-review" onclick="selectMode('review')">
        <span class="mode-icon">📖</span>
        <div class="mode-label">複習</div>
        <div class="mode-desc">字卡+練習</div>
      </div>
      <div class="mode-btn" id="mode-quiz" onclick="selectMode('quiz')">
        <span class="mode-icon">🎯</span>
        <div class="mode-label">選擇題</div>
        <div class="mode-desc">四選一</div>
      </div>
      <div class="mode-btn" id="mode-match" onclick="selectMode('match')">

        <div class="mode-label">配合題</div>
        <div class="mode-desc">限時連線</div>
      </div>

    </div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startSession()" disabled>選擇模式後開始</button>
  <span class="review-link" onclick="showPage('all-cards')">🗂 全字卡總覽 &amp; 熟悉度</span>
</div>

<!-- ══ FLASHCARD SINGLE ══ -->
<div id="page-flashcard" class="page">
  <div class="pg-header">
    <button class="back-btn" onclick="showPage('home')">← 返回</button>
    <span class="pg-title" id="fc-title">字卡複習</span>
    <span class="pg-meta" id="fc-meta"></span>
  </div>
  <div style="padding:0 16px">
    <div class="progress-label" id="fc-prog-label"></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="fc-progress" style="width:0%"></div></div>
  </div>

  <div id="fc-card-view" style="padding:0 16px">
    <div class="flip-card-container" onclick="flipCard()" style="height:250px">
      <div class="flip-card" id="flip-card">
        <div class="flip-face flip-front">
          <div class="fc-num-badge" id="fc-num"></div>
          <div class="fc-word-row">
            <div class="fc-word" id="fc-word-text"></div>
            <button class="audio-btn" onclick="speakIt(event,'fc-word-text')">🔊</button>
          </div>
          <div class="fc-pos-pill" id="fc-pos"></div>
          <div class="flip-hint">點擊翻轉</div>
        </div>
        <div class="flip-face flip-back">
          <div class="fc-meaning-back" id="fc-meaning"></div>
          <div class="fc-example-back" id="fc-example"></div>
          <div class="flip-hint">再次點擊翻轉</div>
        </div>
      </div>
    </div>

    <div class="word-list-grid" id="word-list-grid"></div>
    <div class="card-nav">
      <button class="btn btn-secondary" onclick="showPage('home')">返回首頁</button>
      <button class="btn btn-primary" id="deep-btn" onclick="startDeepReview()">開始深度複習 →</button>
    </div>
  </div>
</div>

<!-- ══ QUIZ ══ -->
<div id="page-quiz" class="page">
  <div class="pg-header">
    <button class="back-btn" onclick="confirmBack()">← 返回</button>
    <span class="pg-title" id="quiz-title">選擇題</span>
    <span class="quiz-type-badge" id="quiz-badge">英→中</span>
  </div>
  <div class="quiz-inner">
    <div class="progress-label" id="quiz-prog-label"></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="quiz-progress" style="width:0%"></div></div>
    <div class="quiz-q" id="quiz-q">
      <div class="quiz-q-label" id="quiz-q-label"></div>
      <div class="quiz-word-row" id="quiz-word-row" style="display:none">

<!-- ══ MATCH ══ -->
<div id="page-match" class="page">

    <span class="pg-meta" id="match-meta"></span>
  </div>

    <div class="timer-bar-wrap"><div class="timer-bar-fill" id="timer-bar" style="width:100%"></div></div>

      <span class="timer-num" id="timer-num">00:00</span>
      <span style="font-size:12px;color:var(--text3)" id="match-group-info"></span>
    </div>
    <div class="progress-label" id="match-prog-label"></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="match-progress" style="width:0%"></div></div>
    <div class="match-grid">
      <div class="match-col" id="match-words"></div>
      <div class="match-col" id="match-means"></div>
    </div>
  </div>
</div>

<!-- ══ SCORE ══ -->
<div id="page-score" class="page">
  <div class="score-grade" id="score-grade"></div>
  <div class="score-circle" id="score-circle" style="--pct:0%">
    <div class="score-number" id="score-num"></div>
  </div>
  <div class="score-detail" id="score-detail"></div>
  <div class="score-time" id="score-time"></div>
  <div class="score-actions">

    <button class="btn btn-primary" onclick="showPage('all-cards')">🗂 字卡總覽</button>
  </div>
  <div id="error-list"></div>
</div>

<div id="page-all-cards" class="page">
  <div class="pg-header">
    <button class="back-btn" onclick="showPage('home')">← 返回</button>
    <span class="pg-title">全字卡總覽</span>
    <span class="pg-meta">819</span>
  </div>
  <div class="legend">

  if (!UNIT_MAP[w.unit]) UNIT_MAP[w.unit] = [];
  UNIT_MAP[w.unit].push(w);
});
const UNITS = Object.keys(UNIT_MAP).map(Number).sort((a,b)=>a-b);

// ═══════════════════════════════
// STATE
// ═══════════════════════════════
const S = {
  mode: null, selUnit: 1,
  fromNum: 1, toNum: 34,
  useFC: false,
  words: [],            // selected words for session
  // flashcard
  fcIdx: 0, skipped: new Set(), seen: new Set(),
  // quiz
  qQueue: [], qIdx: 0, qErrors: [], qCorrect: 0,
  // match
  mGroups: [], mGIdx: 0, mErrors: [], mCorrect: 0,
  mSelWord: null, mSelMean: null,
  mTimerTotal: 0, mTimerLeft: 0, mTimerInterval: null,
  mStartTime: 0, mElapsed: 0,
};

// ═══════════════════════════════
// FAMILIARITY
// ═══════════════════════════════
function loadFam() {
  try { return JSON.parse(localStorage.getItem('wc_fam')||'{}'); } catch { return {}; }
}
function saveFam(f) { try { localStorage.setItem('wc_fam', JSON.stringify(f)); } catch {} }
function getFamStatus(id) {
  const s = (loadFam()[id]||0);
  if (s===0) return 'gray';
  if (s<0) return 'red';
  if (s===1) return 'yellow';
  return 'green';
}
function updateFam(id, correct) {
  const f = loadFam();
  const c = f[id]||0;
  f[id] = correct ? Math.min(c+1,3) : Math.max(c-1,-2);
  saveFam(f);
}

// ═══════════════════════════════
// UTILS
// ═══════════════════════════════
function shuffle(a) {
  const r=[...a];
  for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}
  return r;
}
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  window.scrollTo(0,0);
  if (name==='all-cards') renderAC();
}
function showToast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+type;
  setTimeout(()=>t.className='toast',1800);
}
function speakIt(e, elId) {
  e.stopPropagation();
  const txt = document.getElementById(elId).textContent;
  if (!window.speechSynthesis) return;
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US'; u.rate=0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
function confirmBack() {
  if (confirm('確定要離開此次測驗？進度將會重置。')) {
    stopTimer(); showPage('home');
  }
}
function getDistractors(target, pool, count=3) {
  const samePOS = pool.filter(w=>w.id!==target.id && w.pos===target.pos);
  const fallback = pool.filter(w=>w.id!==target.id);
  const src = samePOS.length>=count ? samePOS : fallback;
  return shuffle(src).slice(0,count);
}
function fmtTime(s) {
  const m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ═══════════════════════════════
// HOME INIT
// ═══════════════════════════════
function initHome() {
  const container=document.getElementById('unit-pills');
  container.innerHTML='';
  UNITS.forEach(u=>{
    const el=document.createElement('div');
    el.className='unit-pill'+(u===S.selUnit?' selected':'');
    el.textContent='U'+u;
    el.dataset.unit=u;
    el.onclick=()=>selectUnit(u,el);
    container.appendChild(el);
  });
  updateUnitRange();
}

function selectUnit(u, el) {
  S.selUnit=u;
  document.querySelectorAll('.unit-pill').forEach(p=>p.classList.remove('selected'));
  el.classList.add('selected');
  const ws=UNIT_MAP[u];
  document.getElementById('range-from').value=1;
  document.getElementById('range-to').value=ws[ws.length-1].num;
  updateUnitRange();
}

function updateUnitRange() {
  const ws=UNIT_MAP[S.selUnit]||[];
  const maxNum=ws.length>0?ws[ws.length-1].num:1;
  document.getElementById('range-unit-max').textContent='(最多'+maxNum+')';
  const from=parseInt(document.getElementById('range-from').value)||1;
  const to=parseInt(document.getElementById('range-to').value)||maxNum;
  const selected=ws.filter(w=>w.num>=from && w.num<=to);
  document.getElementById('range-hint').textContent=
    `共 ${selected.length} 個單字（單元 ${S.selUnit}）`;
  S.fromNum=from; S.toNum=to;
  // Enable start button if mode selected
  if (S.mode && selected.length>0) {
    document.getElementById('start-btn').disabled=false;
  }
}

function getSelectedWords() {
  // Always re-read from DOM to avoid stale state
  const selPill=document.querySelector('.unit-pill.selected');
  const unit=selPill?parseInt(selPill.dataset.unit):S.selUnit;
  S.selUnit=unit;
  const ws=UNIT_MAP[unit]||[];
  const from=parseInt(document.getElementById('range-from').value)||1;
  const to=parseInt(document.getElementById('range-to').value)||9999;
  return ws.filter(w=>w.num>=from && w.num<=to);
}

function selectMode(m) {
  S.mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('mode-'+m).classList.add('selected');
  document.getElementById('start-btn').disabled=false;
  document.getElementById('start-btn').textContent='開始 →';
  const showFC=m==='quiz'||m==='match';
  document.getElementById('fc-toggle-row').style.display=showFC?'flex':'none';
}

function toggleFC() {
  S.useFC=!S.useFC;
  document.getElementById('fc-sw').classList.toggle('on',S.useFC);
}

function startSession() {
  if (!S.mode) { showToast('請先選擇一個模式'); return; }
  S.words=getSelectedWords();
  if (!S.words.length) { showToast('範圍內沒有單字，請調整範圍'); return; }
  S.skipped.clear(); S.seen.clear();
  if (S.mode==='review') startFCList();
  else if (S.useFC) startFCList();
  else if (S.mode==='quiz') startQuiz(S.words);
  else startMatch(S.words);
}

// ═══════════════════════════════
// FLASHCARD
// ═══════════════════════════════
function startFCList() {
  S.fcIdx=0;
  showPage('flashcard');
  document.getElementById('fc-title').textContent=S.mode==='review'?'字卡複習':'預習字卡';
  document.getElementById('fc-card-view').style.display='block';
  document.getElementById('fc-list-view').style.display='none';
  renderFC();
}
function renderFC() {
  const ws=S.words;
  if (S.fcIdx>=ws.length) { showFCList(); return; }
  const w=ws[S.fcIdx];
  const pct=(S.fcIdx/ws.length)*100;
  document.getElementById('fc-progress').style.width=pct+'%';
  document.getElementById('fc-prog-label').textContent=`${S.fcIdx+1} / ${ws.length}`;
  document.getElementById('fc-meta').textContent=`${S.fcIdx+1}/${ws.length}`;
  document.getElementById('fc-num').textContent=`單元${w.unit} · 第${w.num}個`;
  document.getElementById('fc-word-text').textContent=w.word;
  document.getElementById('fc-pos').textContent=w.pos+'.';
  document.getElementById('fc-meaning').textContent=w.meaning;
  document.getElementById('fc-example').innerHTML=
    w.eng.replace(/_____/g,`<span class="w-hl">${w.word}</span>`) +
    (w.chi_sentence ? `<div class="fc-example-chi">${w.chi_sentence}</div>` : '');
  document.getElementById('flip-card').classList.remove('flipped');
}
function flipCard(){document.getElementById('flip-card').classList.toggle('flipped');}
function skipWord(){S.skipped.add(S.words[S.fcIdx].id);S.fcIdx++;renderFC();}
function markSeen(){S.seen.add(S.words[S.fcIdx].id);S.fcIdx++;renderFC();}

function showFCList() {
  document.getElementById('fc-card-view').style.display='none';
  document.getElementById('fc-list-view').style.display='block';
  document.getElementById('fc-progress').style.width='100%';
  const grid=document.getElementById('word-list-grid');
  grid.innerHTML='';
  S.words.forEach(w=>{
    const ch=document.createElement('div');
    const sk=S.skipped.has(w.id), sn=S.seen.has(w.id);
    ch.className='word-chip'+(sk?' skipped':sn?' seen':'');
    ch.innerHTML=`<div class="word-chip-num">U${w.unit}·${w.num}</div><div class="word-chip-word">${w.word}</div><div class="word-chip-badge"></div>`;
    ch.onclick=()=>openModal(w);
    grid.appendChild(ch);
  });
  document.getElementById('deep-btn').textContent=
    S.mode==='review'?`深度複習 (${S.words.length}字) →`:
    S.mode==='quiz'?'進入選擇題 →':'進入配合題 →';
  document.getElementById('fc-meta').textContent=`跳過${S.skipped.size}個`;
}
function startDeepReview() {
  if (S.mode==='review') {
    const sk=S.words.filter(w=>S.skipped.has(w.id));
    const rest=S.words.filter(w=>!S.skipped.has(w.id));
    startQuiz([...sk,...rest]);
  } else if (S.mode==='quiz') startQuiz(S.words);
  else startMatch(S.words);
}

// ═══════════════════════════════
// QUIZ
// ═══════════════════════════════
function startQuiz(words, retry=false) {
  S.qErrors=[]; S.qCorrect=0; S.qIdx=0;
  const mcq=shuffle(words).map((w,i)=>({w,type:i%2===0?'e2c':'c2e'}));
  const blank=shuffle(words)
    .filter(w=>w.blanked&&w.blanked.includes('_____'))
    .map(w=>({w,type:'blank'}));
  S.qQueue=[...mcq,...blank];
  S.qPool=words;
  showPage('quiz');
  document.getElementById('quiz-title').textContent=retry?'再考錯誤':'選擇題';
  renderQ();
}
function renderQ() {
  const tot=S.qQueue.length, idx=S.qIdx;
  if (idx>=tot){showScore();return;}
  const {w,type}=S.qQueue[idx];
  document.getElementById('quiz-progress').style.width=(idx/tot*100)+'%';
  document.getElementById('quiz-prog-label').textContent=`${idx+1} / ${tot}`;
  document.getElementById('quiz-badge').textContent=
    type==='e2c'?'英→中':type==='c2e'?'中→英':'挖空例句';

  const wordRow=document.getElementById('quiz-word-row');
  const meaning=document.getElementById('quiz-meaning');
  const sentence=document.getElementById('quiz-sentence');
  const bnote=document.getElementById('blank-note');
  wordRow.style.display='none';meaning.style.display='none';
  sentence.style.display='none';bnote.style.display='none';

  if (type==='e2c') {
    document.getElementById('quiz-q-label').textContent='這個英文單字的中文意思是？';
    document.getElementById('quiz-word').textContent=w.word;
    wordRow.style.display='flex';
  } else if (type==='c2e') {
    document.getElementById('quiz-q-label').textContent='這個中文意思對應的英文單字是？';
    meaning.textContent=w.meaning; meaning.style.display='block';
  } else {
    document.getElementById('quiz-q-label').textContent='選出填入空格的正確單字';
    sentence.innerHTML=w.blanked.replace('_____','<span class="blank"></span>');
    sentence.style.display='block'; bnote.style.display='block';
  }

  const pool = S.qPool || S.words;
  const dists=getDistractors(w, pool);
  const opts=shuffle([w,...dists]);
  const labels=['A','B','C','D'];
  const container=document.getElementById('quiz-options');
  container.innerHTML='';
  opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='quiz-opt';
    // For blank type: show word; for e2c: show meaning; for c2e: show word
    const display = (type==='e2c')?o.meaning : o.word;
    btn.innerHTML=`<span class="opt-label">${labels[i]}</span>${display}`;
    btn.onclick=()=>answerQ(btn, o.id===w.id, w, type);
    container.appendChild(btn);
  });
  document.getElementById('quiz-next').className='quiz-next-btn';
}
function answerQ(btn, correct, w, type) {
  document.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
  updateFam(w.id, correct);
  if (correct) {
    btn.classList.add('correct'); S.qCorrect++;
    showToast('✓ 正確！','correct');
  } else {
    btn.classList.add('wrong');
    S.qErrors.push(w);
    // highlight correct
    document.querySelectorAll('.quiz-opt').forEach(b=>{
      const display=(type==='e2c')?w.meaning:w.word;
      if(b.textContent.includes(display)) b.classList.add('correct');
    });
    showToast('✗ 答錯了','wrong');
  }
  document.getElementById('quiz-next').className='quiz-next-btn visible';
}
function nextQ(){S.qIdx++;renderQ();}

// ═══════════════════════════════
// MATCH + TIMER
// ═══════════════════════════════
function startMatch(words) {
  stopTimer();
  const GROUP=8;
  const sh=shuffle(words);
  S.mGroups=[];
  for(let i=0;i<sh.length;i+=GROUP) S.mGroups.push(sh.slice(i,i+GROUP));
  S.mGIdx=0; S.mErrors=[]; S.mCorrect=0;
  S.mTimerTotal=words.length*10;
  S.mTimerLeft=S.mTimerTotal;
  S.mStartTime=Date.now();
  showPage('match');
  renderMatchGroup();
  startTimer();
}
function startTimer() {
  stopTimer();
  updateTimerUI();
  S.mTimerInterval=setInterval(()=>{
    S.mTimerLeft--;
    if(S.mTimerLeft<=0){S.mTimerLeft=0;updateTimerUI();stopTimer();showScore();return;}
    updateTimerUI();
  },1000);
}
function stopTimer() {
  if(S.mTimerInterval){clearInterval(S.mTimerInterval);S.mTimerInterval=null;}
  S.mElapsed=Math.round((Date.now()-S.mStartTime)/1000);
}
function updateTimerUI() {
  const left=S.mTimerLeft, total=S.mTimerTotal;
  const pct=(left/total)*100;
  const bar=document.getElementById('timer-bar');
  const num=document.getElementById('timer-num');
  bar.style.width=pct+'%';
  bar.className='timer-bar-fill'+(pct<25?' danger':pct<50?' warning':'');
  num.textContent=fmtTime(left);
  num.className='timer-num'+(pct<25?' danger':pct<50?' warning':'');
}
function penalizeTime(secs=10) {
  S.mTimerLeft=Math.max(0,S.mTimerLeft-secs);
  updateTimerUI();
  showToast(`-${secs}秒！`,'wrong');
}

function renderMatchGroup() {
  const tot=S.mGroups.length, idx=S.mGIdx;
  if(idx>=tot){stopTimer();S.mElapsed=Math.round((Date.now()-S.mStartTime)/1000);showScore();return;}
  const group=S.mGroups[idx];
  document.getElementById('match-meta').textContent=`${idx+1}/${tot}`;
  document.getElementById('match-prog-label').textContent=`第 ${idx+1} 組 / 共 ${tot} 組`;
  document.getElementById('match-progress').style.width=(idx/tot*100)+'%';
  document.getElementById('match-group-info').textContent=`第${idx+1}組 · ${group.length}字`;
  S.mSelWord=null; S.mSelMean=null;

  const wList=shuffle([...group]);
  const mList=shuffle([...group]);
  const wCol=document.getElementById('match-words');
  const mCol=document.getElementById('match-means');
  wCol.innerHTML=''; mCol.innerHTML='';

  wList.forEach(w=>{
    const el=document.createElement('div');
    el.className='match-item';
    el.innerHTML=`<span class="match-word">${w.word}</span>`;
    el.dataset.id=w.id;
    el.onclick=()=>selMatch(el,'word',w.id);
    wCol.appendChild(el);
  });
  mList.forEach(w=>{
    const el=document.createElement('div');
    el.className='match-item';
    el.innerHTML=`<span class="match-meaning">${w.meaning}</span>`;
    el.dataset.id=w.id;
    el.onclick=()=>selMatch(el,'mean',w.id);
    mCol.appendChild(el);
  });
}
function selMatch(el, side, id) {
  if(el.classList.contains('matched-ok')) return;
  if(side==='word'){
    document.querySelectorAll('#match-words .match-item').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected'); S.mSelWord={el,id};
  } else {
    document.querySelectorAll('#match-means .match-item').forEach(e=>e.classList.remove('selected'));
    el.classList.add('selected'); S.mSelMean={el,id};
  }
  if(S.mSelWord&&S.mSelMean) checkMatch();
}
function checkMatch() {
  const {el:wEl,id:wId}=S.mSelWord;
  const {el:mEl,id:mId}=S.mSelMean;
  S.mSelWord=null; S.mSelMean=null;
  if(wId===mId){
    wEl.classList.remove('selected'); wEl.classList.add('matched-ok');
    mEl.classList.remove('selected'); mEl.classList.add('matched-ok');
    S.mCorrect++; updateFam(wId,true);
    const left=document.querySelectorAll('#match-words .match-item:not(.matched-ok)').length;
    if(left===0) setTimeout(()=>{S.mGIdx++;renderMatchGroup();},500);
  } else {
    wEl.classList.remove('selected'); wEl.classList.add('matched-err');
    mEl.classList.remove('selected'); mEl.classList.add('matched-err');
    const wrongW=S.mGroups[S.mGIdx].find(w=>w.id===wId);
    if(wrongW) S.mErrors.push(wrongW);
    updateFam(wId,false);
    penalizeTime(10);
    setTimeout(()=>{wEl.classList.remove('matched-err');mEl.classList.remove('matched-err');},700);
  }
}

// ═══════════════════════════════
// SCORE
// ═══════════════════════════════
function showScore() {
  stopTimer();
  showPage('score');
  const isMatch=S.mode==='match';
  const errors=isMatch?S.mErrors:S.qErrors;
  const total=isMatch
    ?S.mGroups.reduce((s,g)=>s+g.length,0)
    :S.qQueue.length;
  const correct=isMatch?S.mCorrect:S.qCorrect;
  const pct=total>0?Math.round(correct/total*100):0;

  document.getElementById('score-grade').textContent=
    pct>=90?'🌟':pct>=75?'✨':pct>=60?'💪':'📚';
  document.getElementById('score-num').textContent=pct+'%';
  document.getElementById('score-circle').style.setProperty('--pct',pct+'%');
  document.getElementById('score-detail').textContent=`答對 ${correct} / ${total} 題`;

  if(isMatch) {
    const elapsed=S.mElapsed||Math.round((Date.now()-S.mStartTime)/1000);
    document.getElementById('score-time').textContent=`⏱ 用時 ${fmtTime(elapsed)}`;
  } else {
    document.getElementById('score-time').textContent='';
  }

  const unique=[...new Map(errors.map(w=>[w.id,w])).values()];
  const el=document.getElementById('error-list');
  if(unique.length){
    el.innerHTML=`<div class="error-list-title">錯誤單字（${unique.length}個）</div>`;
    unique.forEach(w=>{
      const d=document.createElement('div');
      d.className='error-item';
      d.innerHTML=`<div class="error-word">${w.word}</div><div class="error-meaning">${w.meaning}<br><small style="color:var(--text3);font-size:11px">${w.eng}</small></div>`;
      el.appendChild(d);
    });
    document.getElementById('retry-btn').style.display='inline-flex';
  } else {
    el.innerHTML='<div style="color:var(--green);text-align:center;padding:24px;font-size:16px">🎉 全部答對！</div>';
    document.getElementById('retry-btn').style.display='none';
  }
}
function retryErrors() {
  const errors=S.mode==='match'?S.mErrors:S.qErrors;
  const unique=[...new Map(errors.map(w=>[w.id,w])).values()];
  if(!unique.length) return;
  S.words=unique;
  startQuiz(unique,true);
}

// ═══════════════════════════════
// ALL CARDS
// ═══════════════════════════════
let acFilter='all', acSearch='';
function setFilter(f,el) {
  acFilter=f;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderAC();
}
function setSearch(v){acSearch=v;renderAC();}
function renderAC() {
  const sort=document.getElementById('sort-select').value;
  let list=[...WORDS];
  // filter
  list=list.filter(w=>{
    const s=getFamStatus(w.id);
    const mf=acFilter==='all'||s===acFilter;
    const ms=!acSearch||w.word.toLowerCase().includes(acSearch.toLowerCase())||w.meaning.includes(acSearch);
    return mf&&ms;
  });
  // sort
  if(sort==='az') list.sort((a,b)=>a.word.localeCompare(b.word));
  else if(sort==='unit') list.sort((a,b)=>a.unit-b.unit||a.num-b.num);
  else if(sort==='familiarity'){
    const order={red:0,gray:1,yellow:2,green:3};
    list.sort((a,b)=>(order[getFamStatus(a.id)]||0)-(order[getFamStatus(b.id)]||0));
  }
  const grid=document.getElementById('ac-grid');
  grid.innerHTML='';
  list.forEach(w=>{
    const s=getFamStatus(w.id);
    const card=document.createElement('div');
    card.className=`ac-card status-${s}`;
    card.innerHTML=`<div class="ac-num">U${w.unit}·${w.num}</div><div class="ac-word">${w.word}</div><div class="ac-meaning">${w.meaning}</div><div class="ac-status-dot"></div>`;
    card.onclick=()=>openModal(w);
    grid.appendChild(card);
  });
}

// ═══════════════════════════════
// MODAL
// ═══════════════════════════════
function openModal(w) {
  document.getElementById('m-num').textContent=`單元${w.unit} · 第${w.num}個`;
  document.getElementById('m-word').textContent=w.word;
  document.getElementById('m-pos').textContent=w.pos+'.';
  document.getElementById('m-meaning').textContent=w.meaning;
  document.getElementById('m-example').innerHTML=
    w.eng.replace(/_____/g,`<span class="w-hl">${w.word}</span>`) +
    (w.chi_sentence ? `<div class="fc-example-chi">${w.chi_sentence}</div>` : '');
  document.getElementById('modal-card').classList.remove('flipped');
  document.getElementById('modal-overlay').classList.add('open');
}
function flipModal(){document.getElementById('modal-card').classList.toggle('flipped');}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalBtn();}
function closeModalBtn(){document.getElementById('modal-overlay').classList.remove('open');}

// ═══════════════════════════════
// RANGE INPUT LISTENERS
// ═══════════════════════════════
['range-from','range-to'].forEach(id=>{
  document.getElementById(id).addEventListener('input',updateUnitRange);
  document.getElementById(id).addEventListener('change',updateUnitRange);
});

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
initHome();
</script>
